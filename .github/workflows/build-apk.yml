name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Generate package-lock.json (if missing)
        run: npm install --package-lock-only || true

      - name: Initialize Capacitor Android platform
        run: |
          if [ ! -f android/.gitignore ]; then
            npx cap init "Game Space" com.aliienkingmx.gamespace
            npx cap add android
          else
            echo "✓ Android platform already initialized, running sync..."
          fi

      - name: Sync Capacitor with Android
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: GameSpace-APK-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # ────────── Release (signed with apksigner) ──────────
      - name: Generate release keystore
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias gamespace \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass gamespace123 \
            -keypass gamespace123 \
            -dname "CN=Aliienkingmx, OU=GameSpace, O=Aliienkingmx, L=Mexico, ST=Mexico, C=MX"

      - name: Build unsigned release APK
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Find Android SDK build-tools & sign APK
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          BUILD_TOOLS="$ANDROID_HOME/build-tools"
          VERSION=$(ls "$BUILD_TOOLS" | sort -V | tail -1)
          "$BUILD_TOOLS/$VERSION/apksigner" sign \
            --ks release.keystore \
            --ks-key-alias gamespace \
            --ks-pass pass:gamespace123 \
            --key-pass pass:gamespace123 \
            --out GameSpace-signed.apk \
            android/app/build/outputs/apk/release/app-release-unsigned.apk
          echo "✓ APK firmado: GameSpace-signed.apk"

      - name: Upload signed release APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: GameSpace-APK-Signed
          path: GameSpace-signed.apk
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Game Space ${{ github.ref_name }}
          body: |
            ## 🎮 Game Space ${{ github.ref_name }}

            ### ✅ Descargas
            - **APK Debug** (universal): disponible en artifacts
            - **APK Release firmado**: disponible en artifacts (instalación directa)

            ### ✨ Novedades
            - Sistema Pro con licencia vitalicia
            - Donaciones vía PayPal / Ko-fi
            - Integración AdMob (versión gratuita)
            - APK firmado listo para instalar

            ### 📋 Requisitos
            - Android 8.0+
            - Shizuku v13.5+
            - Termux (F-Droid)

            ### 🚀 Instalación
            1. Descarga el APK firmado (GameSpace-APK-Signed)
            2. Activa "Instalar desde fuentes desconocidas"
            3. Instala y abre Game Space
            4. Concede permisos de Shizuku
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
